services:
  kali:
    build:
      context: ./kali
      dockerfile: Dockerfile

    image: valhalla/kali:latest
    container_name: kali-lab
    hostname: kali

    stdin_open: true
    tty: true
    privileged: true

    cap_add:
      - NET_ADMIN
      - NET_RAW

    security_opt:
      - seccomp=unconfined

    volumes:
      - /srv/security/workspace:/workspace
      - /srv/security/scans:/scans
      - /srv/security/reports:/reports
      - /srv/security/loot:/loot
      - /srv/security/wordlists:/wordlists

    networks:
      - security

    restart: unless-stopped

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - vaultwarden-data:/data

    environment:
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "true"

networks:
  security:
    driver: bridge

volumes:
  vaultwarden-data:
